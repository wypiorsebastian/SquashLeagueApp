<mat-sidenav-container>
  <mat-sidenav #sidenav role="navigation">
    <mat-nav-list>
      <a mat-list-item routerLink="/signup" (click)="sidenav.toggle()">
        <mat-icon>face</mat-icon>
        <span class="nav-caption">Rejestracja</span>
      </a>
      <a mat-list-item routerLink="/login" (click)="sidenav.toggle()">
        <mat-icon>input</mat-icon>
        <span class="nav-caption">Zaloguj</span>
      </a>
      <a mat-list-item routerLink="/training" (click)="sidenav.toggle()">
        <mat-icon>gavel</mat-icon>
        <span class="nav-caption">Mecz</span>
      </a>
      <mat-list-item>
        <button mat-icon-button>
          <mat-icon>eject</mat-icon>
          <span class="nav-caption">Wyloguj</span>
        </button>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <div fxHide.gt-xs>
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      </div>
      <div>LOGO</div>
      <div fxFlex fxLayout fxLayoutAlign="flex-end" fxHide.xs>
        <ul fxLayout fxLayoutGap="25px" class="navigation-items">
          <li><a routerLink="/signup">Zarejestruj</a></li>
          <li><a routerLink="/login">Zaloguj</a></li>
          <li><a routerLink="/training">Mecz</a></li>
          <li><a routerLink="/training">Wyloguj</a></li>
        </ul>
      </div>
    </mat-toolbar>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
